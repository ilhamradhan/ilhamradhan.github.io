<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ilham Ramadhan</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #282a36;
      --bg2:      #1e1f29;
      --surface:  #343746;
      --surface2: #44475a;
      --border:   #6272a4;
      --comment:  #6272a4;
      --fg:       #f8f8f2;
      --fg-dim:   #cdd6f4;
      --cyan:     #8be9fd;
      --green:    #50fa7b;
      --orange:   #ffb86c;
      --pink:     #ff79c6;
      --purple:   #bd93f9;
      --red:      #ff5555;
      --yellow:   #f1fa8c;
      --radius:   10px;
      --sidebar:  300px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg2);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 2rem;
      overflow-y: auto;
      z-index: 100;
    }

    .avatar-wrap {
      position: relative;
      width: 130px; height: 130px;
      margin-bottom: 1.5rem;
    }

    .avatar-wrap img,
    .avatar-placeholder {
      width: 130px; height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--purple);
    }

    .avatar-placeholder {
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fira Code', monospace;
      font-size: 2rem;
      color: var(--purple);
    }

    .status-dot {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--bg);
    }

    #sidebar h1 {
      font-family: 'Fira Code', monospace;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--fg);
      text-align: center;
      margin-bottom: .35rem;
    }

    .tagline {
      font-size: .8rem;
      color: var(--cyan);
      font-family: 'Fira Code', monospace;
      text-align: center;
      margin-bottom: .5rem;
    }

    .location {
      font-size: .78rem;
      color: var(--comment);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .location::before { content: "📍 "; }

    .bio {
      font-size: .83rem;
      color: var(--fg-dim);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 1.8rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--surface2);
    }

    /* sidebar nav */
    nav { width: 100%; margin-bottom: 1.8rem; }
    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .5rem .75rem;
      border-radius: 6px;
      text-decoration: none;
      color: var(--comment);
      font-size: .82rem;
      font-family: 'Fira Code', monospace;
      transition: background .18s, color .18s;
      margin-bottom: 2px;
    }
    nav a:hover, nav a.active {
      background: var(--surface);
      color: var(--purple);
    }
    nav a .nav-icon { width: 18px; text-align: center; font-size: .85rem; }

    /* social links */
    .socials {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: auto;
      padding-top: 1rem;
    }
    .socials a {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--surface2);
      color: var(--comment);
      text-decoration: none;
      font-size: .85rem;
      transition: border-color .18s, color .18s;
    }
    .socials a:hover { border-color: var(--purple); color: var(--purple); }

    /* ── MAIN ── */
    #main {
      margin-left: var(--sidebar);
      flex: 1;
      padding: 3rem 3rem 4rem;
      max-width: 1100px;
    }

    section { margin-bottom: 4rem; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-family: 'Fira Code', monospace;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--purple);
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface2);
    }

    .section-num {
      font-family: 'Fira Code', monospace;
      font-size: .75rem;
      color: var(--pink);
    }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .about-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }

    .about-card h3 {
      font-family: 'Fira Code', monospace;
      font-size: .85rem;
      color: var(--cyan);
      margin-bottom: .75rem;
    }

    .about-card p {
      font-size: .87rem;
      color: var(--fg-dim);
      line-height: 1.7;
    }

    .stat-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat {
      background: var(--bg);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: .9rem 1.2rem;
      flex: 1;
      text-align: center;
    }

    .stat-val {
      font-family: 'Fira Code', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--green);
      display: block;
    }

    .stat-label {
      font-size: .75rem;
      color: var(--comment);
      margin-top: .2rem;
    }

    /* ── PROJECTS ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, transform .2s;
      display: flex;
      flex-direction: column;
    }

    .project-card:hover {
      border-color: var(--purple);
      transform: translateY(-3px);
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      height: 170px;
      overflow: hidden;
      background: var(--bg);
    }

    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* GIF placeholder (replace src with your actual .gif) */
    .thumb-placeholder {
      width: 100%; height: 100%;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .thumb-placeholder .gif-badge {
      background: var(--surface2);
      color: var(--cyan);
      font-family: 'Fira Code', monospace;
      font-size: .7rem;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .thumb-placeholder .pipeline-anim {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pipe-node {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-family: 'Fira Code', monospace;
      animation: pulse 2s ease-in-out infinite;
    }

    .pipe-node.n1 { background: #44475a; color: var(--cyan); animation-delay: 0s; }
    .pipe-node.n2 { background: #44475a; color: var(--green); animation-delay: .4s; }
    .pipe-node.n3 { background: #44475a; color: var(--orange); animation-delay: .8s; }
    .pipe-node.n4 { background: #44475a; color: var(--purple); animation-delay: 1.2s; }

    .pipe-arrow { color: var(--comment); font-size: .8rem; }

    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.08); }
    }

    .project-body { padding: 1.1rem 1.25rem; flex: 1; display: flex; flex-direction: column; }

    .project-title {
      font-family: 'Fira Code', monospace;
      font-size: .95rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: .4rem;
    }

    .project-desc {
      font-size: .83rem;
      color: var(--fg-dim);
      line-height: 1.6;
      flex: 1;
      margin-bottom: .9rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: .9rem;
    }

    .tag {
      font-family: 'Fira Code', monospace;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
    }

    .tag.cyan   { color: var(--cyan);   border-color: var(--cyan);   background: rgba(139,233,253,.08); }
    .tag.green  { color: var(--green);  border-color: var(--green);  background: rgba(80,250,123,.08);  }
    .tag.orange { color: var(--orange); border-color: var(--orange); background: rgba(255,184,108,.08); }
    .tag.purple { color: var(--purple); border-color: var(--purple); background: rgba(189,147,249,.08); }
    .tag.pink   { color: var(--pink);   border-color: var(--pink);   background: rgba(255,121,198,.08); }
    .tag.yellow { color: var(--yellow); border-color: var(--yellow); background: rgba(241,250,140,.08); }

    .project-links { display: flex; gap: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: .38rem .85rem;
      border-radius: 6px;
      font-size: .78rem;
      font-family: 'Fira Code', monospace;
      text-decoration: none;
      border: 1px solid;
      transition: background .18s, color .18s;
      cursor: pointer;
    }

    .btn-primary {
      color: var(--purple);
      border-color: var(--purple);
      background: rgba(189,147,249,.08);
    }
    .btn-primary:hover { background: rgba(189,147,249,.2); }

    .btn-ghost {
      color: var(--comment);
      border-color: var(--surface2);
      background: transparent;
    }
    .btn-ghost:hover { color: var(--fg); border-color: var(--comment); }

    /* ── TECH STACK ── */
    .stack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .stack-category {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
    }

    .stack-category h3 {
      font-family: 'Fira Code', monospace;
      font-size: .78rem;
      color: var(--pink);
      margin-bottom: .85rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--surface2);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .stack-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: .3rem 0;
      font-size: .82rem;
      color: var(--fg-dim);
    }

    .stack-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── EXPERIENCE ── */
    .timeline { position: relative; padding-left: 2rem; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 6px; top: 6px;
      bottom: 0;
      width: 1px;
      background: var(--surface2);
    }

    .tl-item {
      position: relative;
      margin-bottom: 2.2rem;
    }

    .tl-dot {
      position: absolute;
      left: -2rem;
      top: 6px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--purple);
      border: 2px solid var(--bg2);
    }

    .tl-date {
      font-family: 'Fira Code', monospace;
      font-size: .75rem;
      color: var(--pink);
      margin-bottom: .3rem;
    }

    .tl-role {
      font-weight: 500;
      font-size: .95rem;
      color: var(--fg);
    }

    .tl-company {
      font-size: .82rem;
      color: var(--cyan);
      margin-bottom: .6rem;
    }

    .tl-body {
      font-size: .83rem;
      color: var(--fg-dim);
      line-height: 1.65;
    }

    .tl-body ul { padding-left: 1.1rem; }
    .tl-body ul li { margin-bottom: .3rem; }
    .tl-body ul li::marker { color: var(--purple); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      font-family: 'Fira Code', monospace;
      font-size: .75rem;
      color: var(--comment);
      padding: 2rem 0 1rem;
      border-top: 1px solid var(--surface2);
    }

    footer span { color: var(--pink); }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      body { flex-direction: column; }
      #sidebar {
        position: relative;
        width: 100%;
        height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 1.5rem;
        gap: 1rem;
        border-right: none;
        border-bottom: 1px solid var(--surface2);
      }
      #main { margin-left: 0; padding: 2rem 1.25rem 3rem; }
      .about-grid { grid-template-columns: 1fr; }
      nav { display: flex; flex-wrap: wrap; gap: 4px; }
    }
  </style>
</head>

</html>
